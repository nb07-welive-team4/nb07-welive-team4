name: Claude PR Review & Bug Detection

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      issues: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.ref }}

      
      - name: Checkout Frontend Repo
        uses: actions/checkout@v6
        with:
          repository: dlckdgh0523-lgtm/welive-front
          path: frontend
          fetch-depth: 1

      
      - name: Extract Frontend API Spec
        run: |
          grep -r "fetch\|axios\|api\|endpoint" frontend/src \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            -h 2>/dev/null | head -100 > frontend_api_spec.txt || echo "No API spec found" > frontend_api_spec.txt
          echo "=== Frontend API Spec ===" 
          cat frontend_api_spec.txt

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations

            ## 프론트엔드 API 호환성 체크
            프론트엔드 레포(dlckdgh0523-lgtm/welive-front)의 API 호출 코드가
            `frontend/` 디렉토리에 체크아웃되어 있습니다.
            `frontend_api_spec.txt` 파일에 프론트의 API 호출 패턴이 있습니다.

            다음을 반드시 확인해주세요:
            - 백엔드 변경사항이 프론트 API 호출과 엔드포인트가 일치하는지
            - 요청/응답 형식(Request/Response DTO)이 프론트 기대값과 맞는지
            - 프론트에서 사용하는 필드명이 백엔드 응답에 존재하는지
            - HTTP 메서드(GET/POST/PUT/DELETE)가 일치하는지
            - 불일치 발견 시 구체적으로 어떤 부분이 다른지 명시해주세요

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

            Additional instruction:
            - Write all review comments in Korean.
            - Keep technical terms, code, commands, file paths, and identifiers in their original English form where appropriate.
            - Write comments as if you are mentoring beginner developers.
            - For each issue, clearly explain the problem, the reason it matters, and the recommended fix.
            - Avoid harsh or vague criticism; make the feedback constructive, practical, and easy to learn from.
            - Make the comments specific, professional, and understandable for junior developers.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(cat frontend_api_spec.txt),Bash(ls frontend/*)"