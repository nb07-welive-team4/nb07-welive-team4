name: Claude PR Review on Mention

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude'))

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout Frontend Repo
        uses: actions/checkout@v6
        with:
          repository: dlckdgh0523-lgtm/welive-front
          path: frontend
          fetch-depth: 1

      - name: Extract Frontend API Spec
        run: |
          grep -r "axios\.\|fetch(" frontend/src \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            -h 2>/dev/null | head -30 > frontend_api_spec.txt || echo "No API spec found" > frontend_api_spec.txt
          echo "=== Frontend API Spec ==="
          cat frontend_api_spec.txt

      - uses: anthropics/claude-code-action@v1.0.99
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You were triggered by an @claude mention on a pull request.

            Act as a 10-year senior backend engineer and strict production reviewer.
            Find only high-confidence issues that can break runtime behavior, security, authorization, database consistency, Prisma migrations, notifications, deployment, or frontend API compatibility.

            Use:
            - PR context available to you
            - `frontend_api_spec.txt`

            Check:
            - Runtime or business logic bugs
            - Security / authorization mistakes
            - Prisma / migration / DB consistency risks
            - Notification duplication, missing notifications, or bad dedupeKey behavior
            - Frontend API mismatch: path, method, request DTO, response DTO
            - Missing error handling
            - Deployment-sensitive failures

            Rules:
            - Be critical and direct.
            - Do not comment on style-only issues.
            - Do not suggest broad refactoring.
            - Do not invent issues.
            - Prefer fewer but sharper comments.
            - If context is insufficient, ask for the needed file or requirement instead of guessing.

            For each issue, write in Korean:
            - 문제 위치
            - 문제 내용
            - 실제 장애/버그 가능성
            - 최소 수정 방향

            Keep code, file paths, API endpoints, DTO names, and identifiers in English.
            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true` for inline issues.
            Only post GitHub comments.
          claude_args: |
            --model claude-sonnet-4-5
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(cat frontend_api_spec.txt)"