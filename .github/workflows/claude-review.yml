name: Claude PR Review on Mention

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude'))

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout Frontend Repo
        uses: actions/checkout@v6
        with:
          repository: dlckdgh0523-lgtm/welive-front
          path: frontend
          fetch-depth: 1

      - name: Extract Frontend API Spec
        run: |
          grep -r "axios\.\|fetch(" frontend/src \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            -h 2>/dev/null | head -50 > frontend_api_spec.txt || echo "No API spec found" > frontend_api_spec.txt
          echo "=== Frontend API Spec ==="
          cat frontend_api_spec.txt

      - uses: anthropics/claude-code-action@v1.0.99
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You were triggered by an @claude mention on a pull request.

            PR NUMBER:
            ${{ github.event.issue.number || github.event.pull_request.number }}

            User request:
            ${{ github.event.comment.body || github.event.review.body }}

            Act as a strict senior backend reviewer.
            Your goal is not to praise the PR. Your goal is to find real bugs, broken assumptions, deployment risks, API mismatches, and production issues before this PR reaches main.

            Review this pull request with a critical but constructive mindset.

            Focus only on high-confidence issues in these areas:
            - Runtime bugs
            - Broken business logic
            - Security risks
            - Authorization or permission mistakes
            - Database / Prisma / migration risks
            - Notification duplication or missing notification risks
            - API contract mismatch with frontend
            - Request/Response DTO mismatch
            - HTTP method mismatch
            - Error handling gaps
            - Deployment or environment-sensitive issues

            The frontend repository has been checked out into `frontend/`.
            The `frontend_api_spec.txt` file contains extracted frontend API call patterns.

            Frontend compatibility review:
            - Compare backend endpoint paths with frontend API calls.
            - Check whether HTTP methods match.
            - Check whether request body fields match what the backend expects.
            - Check whether response fields used by the frontend exist in the backend response.
            - Watch for path mismatches such as `/notifications/sse` vs `/notifications/stream`, `PATCH` vs `POST`, missing aliases, or DTO field mismatches.
            - If a mismatch is found, explain exactly which frontend call and which backend route differ.

            Critical review rules:
            - Do not assume the code is correct.
            - Do not approve vague logic.
            - Do not ignore silent failures.
            - Do not ignore duplicated keys, duplicated notification creation, or dedupeKey mistakes.
            - Do not ignore cases where a change silently removes an existing user-facing behavior.
            - Do not comment on style-only issues.
            - Do not suggest broad refactoring.
            - Do not suggest speculative features.
            - Only report issues that can realistically break behavior, deployment, security, data consistency, or frontend integration.

            Scope control:
            - Use the PR diff and `frontend_api_spec.txt` first.
            - Do not scan the entire repository unless it is necessary to verify a specific high-confidence issue.
            - If context is insufficient, leave a short top-level comment asking for the specific file or requirement instead of guessing.
            - Prefer fewer, sharper comments over many weak comments.

            For each issue, include:
            - 문제 위치
            - 무엇이 문제인지
            - 왜 실제 장애나 버그로 이어질 수 있는지
            - 최소 수정 방향
            - 가능하면 구체적인 코드 예시

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true` for specific code issues.
            Only post GitHub comments.

            Additional instruction:
            - Write all review comments in Korean.
            - Keep technical terms, code, commands, file paths, API endpoints, DTO names, field names, branch names, and identifiers in their original English form.
            - Use a respectful but direct Korean tone.
            - Be critical, but do not be rude.
            - Avoid vague praise.
            - If there are no high-confidence issues, say that no blocking issue was found and briefly mention what was checked.
          claude_args: |
            --model claude-sonnet-4-5
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(cat frontend_api_spec.txt)"