name: Deploy to EC2

on:
  push:
    branches:
      
main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  IMAGE_URI: 022038146145.dkr.ecr.ap-northeast-2.amazonaws.com/nb07-welive-team4:latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      
name: Checkout
      uses: actions/checkout@v5

      
name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::022038146145:role/CICD
        aws-region: ap-northeast-2

      
name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

      
name: Build Docker image
      run: docker build -t $IMAGE_URI .

      
name: Push Docker image
      run: docker push $IMAGE_URI

      
name: Prepare SSH key
      run: |
        mkdir -p ~/.ssh
        printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      
name: Deploy on EC2
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash ~/deploy/nb07-welive-team4/deploy.sh'