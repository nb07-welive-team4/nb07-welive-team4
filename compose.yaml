services:
  app:
    image: 022038146145.dkr.ecr.ap-northeast-2.amazonaws.com/nb07-welive-team4:latest
    container_name: advanced-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
